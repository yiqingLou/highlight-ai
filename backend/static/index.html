<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Highlight AI</title>
  <style>
    body {
      margin: 0; min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 40px 0;
      background: #101014; color: #eee;
      font-family: "Segoe UI", system-ui, sans-serif;
    }
    h1 { letter-spacing: 0.15em; font-weight: 600; }
    h1 span { color: #ffd24a; }
    .card {
      background: #1a1a22; border: 1px solid #2a2a35; border-radius: 12px;
      padding: 32px 40px; width: 480px; margin-bottom: 20px;
    }
    label { display: block; color: #aaa; font-size: 0.85em; margin-bottom: 6px; }
    input[type="text"] {
      width: 100%; box-sizing: border-box; padding: 12px 14px;
      background: #12121a; color: #eee; border: 1px solid #3a3a48;
      border-radius: 8px; font-size: 0.95em; outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #ffd24a; }
    .hint { color: #666; font-size: 0.8em; margin-top: 8px; }
    button {
      margin-top: 18px; width: 100%; padding: 12px;
      background: linear-gradient(135deg, #ffd24a, #ff8c3b);
      color: #1a1a22; font-weight: 700; font-size: 1em;
      border: none; border-radius: 8px; cursor: pointer;
      transition: transform 0.1s, filter 0.2s;
    }
    button:hover { filter: brightness(1.1); }
    button:active { transform: scale(0.98); }
    button:disabled { filter: grayscale(1); cursor: not-allowed; }
    #status { margin-top: 16px; min-height: 22px; font-size: 0.9em; }
    .ok { color: #7dd87d; } .err { color: #ff6b6b; }

    /* Drop zone */
    .drop {
      border: 2px dashed #3a3a48; border-radius: 10px; padding: 30px 16px;
      cursor: pointer; text-align: center;
      transition: border-color 0.2s, background 0.2s;
    }
    .drop:hover, .drop.over { border-color: #ffd24a; background: #20202a; }
    #file { display: none; }
    .divider {
      display: flex; align-items: center; gap: 12px;
      color: #555; font-size: 0.8em; margin: 18px 0;
    }
    .divider::before, .divider::after {
      content: ""; flex: 1; height: 1px; background: #2a2a35;
    }
    .upbar { height: 6px; background: #2a2a35; border-radius: 3px; overflow: hidden; margin-top: 14px; display: none; }
    .upbar > div {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #ffd24a, #ff8c3b);
      transition: width 0.2s;
    }

    /* Pipeline */
    #pipeline { display: none; }
    .stages { display: flex; justify-content: space-between; margin: 18px 0 6px; }
    .stage { flex: 1; text-align: center; color: #555; font-size: 0.8em; transition: color 0.3s; }
    .stage .dot {
      width: 14px; height: 14px; border-radius: 50%; margin: 0 auto 6px;
      background: #2a2a35; transition: background 0.3s, box-shadow 0.3s;
    }
    .stage.active { color: #ffd24a; }
    .stage.active .dot { background: #ffd24a; box-shadow: 0 0 10px #ffd24a88; }
    .stage.done { color: #7dd87d; }
    .stage.done .dot { background: #7dd87d; }
    .bar { height: 6px; background: #2a2a35; border-radius: 3px; overflow: hidden; }
    .bar > div {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #ffd24a, #ff8c3b);
      transition: width 0.4s;
    }
    #stageMsg { margin-top: 10px; color: #999; font-size: 0.85em; min-height: 20px; }

    /* Result */
    #result { display: none; }
    video { width: 100%; border-radius: 8px; margin-top: 6px; background: #000; }
    a.download {
      display: block; text-align: center; margin-top: 14px; padding: 12px;
      background: linear-gradient(135deg, #ffd24a, #ff8c3b);
      color: #1a1a22; font-weight: 700; border-radius: 8px; text-decoration: none;
    }
  </style>
</head>
<body>
  <h1>NARAKA <span>HIGHLIGHT AI</span></h1>

  <div class="card">
    <div class="drop" id="drop">
      <div>Drop a gameplay recording here<br>or click to choose a file</div>
      <div class="hint">MP4 &middot; uploads are stored in the app</div>
    </div>
    <input type="file" id="file" accept="video/mp4" />
    <div class="upbar" id="upbar"><div id="upfill"></div></div>

    <div class="divider">or use a local path (no copying)</div>

    <label for="path">Path to your recording (.mp4)</label>
    <input type="text" id="path"
           placeholder="C:\Users\you\Videos\match.mp4" spellcheck="false" />
    <button id="create">Create Task</button>
    <div id="status"></div>
  </div>

  <div class="card" id="pipeline">
    <label>Task <span id="taskLabel">#-</span></label>
    <div class="stages">
      <div class="stage" id="st0"><div class="dot"></div>Detect</div>
      <div class="stage" id="st1"><div class="dot"></div>Clips</div>
      <div class="stage" id="st2"><div class="dot"></div>Montage</div>
    </div>
    <div class="bar"><div id="barFill"></div></div>
    <div id="stageMsg"></div>
    <label for="player" style="margin-top:14px">Player name (for the outro card)</label>
    <input type="text" id="player" placeholder="your in-game ID" spellcheck="false" />
    <button id="start">Start Processing</button>
  </div>

  <div class="card" id="result">
    <label>Your highlight reel</label>
    <video id="playerVideo" controls></video>
    <a class="download" id="dl" download>Download montage_final.mp4</a>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let taskId = null;

    function setStatus(msg, cls) { $("status").textContent = msg; $("status").className = cls || ""; }
    function stageMsg(msg) { $("stageMsg").textContent = msg; }
    function setBar(pct) { $("barFill").style.width = `${pct}%`; }
    function markStage(i, state) {
      const el = $(`st${i}`);
      el.classList.remove("active", "done");
      if (state) el.classList.add(state);
    }
    function showPipeline(id) {
      taskId = id;
      $("taskLabel").textContent = `#${id}`;
      $("pipeline").style.display = "block";
    }

    // ---- Mode 1: drag & drop upload (XHR for progress events) ----
    const drop = $("drop"), fileInput = $("file");
    drop.addEventListener("click", () => fileInput.click());
    drop.addEventListener("dragover", (e) => { e.preventDefault(); drop.classList.add("over"); });
    drop.addEventListener("dragleave", () => drop.classList.remove("over"));
    drop.addEventListener("drop", (e) => {
      e.preventDefault(); drop.classList.remove("over");
      if (e.dataTransfer.files.length) uploadFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener("change", () => {
      if (fileInput.files.length) uploadFile(fileInput.files[0]);
    });

    function uploadFile(f) {
      if (!f.name.toLowerCase().endsWith(".mp4")) {
        setStatus("Only .mp4 files are supported.", "err");
        return;
      }
      const form = new FormData();
      form.append("file", f);
      const xhr = new XMLHttpRequest();
      xhr.open("POST", "/api/tasks/upload");
      $("upbar").style.display = "block";
      setStatus(`Uploading ${f.name}…`);
      xhr.upload.onprogress = (e) => {
        if (e.lengthComputable) {
          $("upfill").style.width = `${Math.round((e.loaded / e.total) * 100)}%`;
        }
      };
      xhr.onload = () => {
        $("upbar").style.display = "none";
        $("upfill").style.width = "0%";
        try {
          const body = JSON.parse(xhr.responseText);
          if (xhr.status === 200 || xhr.status === 201) {
            setStatus(`Task #${body.id} ready — ${f.name}`, "ok");
            showPipeline(body.id);
          } else {
            setStatus(`Upload failed: ${body.detail || xhr.status}`, "err");
          }
        } catch {
          setStatus(`Upload failed: HTTP ${xhr.status}`, "err");
        }
      };
      xhr.onerror = () => {
        $("upbar").style.display = "none";
        setStatus("Upload failed: network error", "err");
      };
      xhr.send(form);
    }

    // ---- Mode 2: local path (zero-copy) ----
    $("create").addEventListener("click", async () => {
      const raw = $("path").value.trim().replace(/^"|"$/g, "");
      if (!raw.toLowerCase().endsWith(".mp4")) {
        setStatus("Please enter a full path to an .mp4 file.", "err");
        return;
      }
      const filePath = raw.replace(/\\/g, "/");
      const fileName = filePath.split("/").pop();
      $("create").disabled = true;
      setStatus("Creating task…");
      try {
        const res = await fetch("/api/tasks/", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ file_path: filePath, file_name: fileName, game_type: "naraka" }),
        });
        const body = await res.json().catch(() => ({}));
        if (res.ok) {
          setStatus(`Task #${body.id} created — ${fileName}`, "ok");
          showPipeline(body.id);
        } else {
          const m = (body.detail || "").match(/id=(\d+)/);
          if (m) {
            setStatus(`Using existing task #${m[1]} for this file.`, "ok");
            showPipeline(parseInt(m[1], 10));
          } else {
            throw new Error(body.detail || `HTTP ${res.status}`);
          }
        }
      } catch (e) {
        setStatus(`Failed: ${e.message}`, "err");
      } finally {
        $("create").disabled = false;
      }
    });

    // ---- Pipeline ----
    const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

    async function pollUntilDone(label) {
      while (true) {
        await sleep(2000);
        const res = await fetch(`/api/tasks/${taskId}/progress`);
        if (!res.ok) continue;
        const p = await res.json();
        if (p.status === "failed") throw new Error(p.error_message || `${label} failed`);
        if (p.status === "done") return;
        const pct = p.progress ?? 0;
        setBar(pct);
        stageMsg(`${label}… ${pct}%`);
      }
    }

    async function runStage(i, label, startFn) {
      markStage(i, "active");
      setBar(0);
      stageMsg(`${label}…`);
      const res = await startFn();
      if (!res.ok && res.status !== 202) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `${label}: HTTP ${res.status}`);
      }
      await pollUntilDone(label);
      markStage(i, "done");
      setBar(100);
    }

    $("start").addEventListener("click", async () => {
      $("start").disabled = true;
      $("result").style.display = "none";
      try {
        await runStage(0, "Detecting kills", () =>
          fetch(`/api/tasks/${taskId}/extract-frames?fps=1`, { method: "POST" }));

        await runStage(1, "Cutting clips", () =>
          fetch(`/api/tasks/${taskId}/generate-clips?slowmo=true`, { method: "POST" }));

        fetch(`/api/tasks/${taskId}/thumbnails`, { method: "POST" }).catch(() => {});

        const bgm = encodeURIComponent(
          "C:/Users/adwar/projects/highlight-ai/assets/bgm/epic_rock.mp3");
        const pn = encodeURIComponent($("player").value.trim());
        await runStage(2, "Building montage", () =>
          fetch(`/api/tasks/${taskId}/montage?bgm=${bgm}&captions=true&transitions=true&intro_outro=true&player_name=${pn}`,
                { method: "POST" }));

        stageMsg("All done!");
        const url = `/clips/${taskId}/montage_final.mp4`;
        $("playerVideo").src = url;
        $("dl").href = url;
        $("result").style.display = "block";
      } catch (e) {
        stageMsg(`Error: ${e.message}`);
      } finally {
        $("start").disabled = false;
      }
    });
  </script>
</body>
</html>
