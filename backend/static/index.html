<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Highlight AI</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #101014;
      color: #eee;
      font-family: "Segoe UI", system-ui, sans-serif;
    }
    h1 { letter-spacing: 0.15em; font-weight: 600; }
    h1 span { color: #ffd24a; }
    .card {
      background: #1a1a22;
      border: 1px solid #2a2a35;
      border-radius: 12px;
      padding: 32px 40px;
      width: 460px;
    }
    label { display: block; color: #aaa; font-size: 0.85em; margin-bottom: 6px; }
    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      background: #12121a;
      color: #eee;
      border: 1px solid #3a3a48;
      border-radius: 8px;
      font-size: 0.95em;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #ffd24a; }
    .hint { color: #666; font-size: 0.8em; margin-top: 8px; }
    button {
      margin-top: 18px;
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #ffd24a, #ff8c3b);
      color: #1a1a22;
      font-weight: 700;
      font-size: 1em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s, filter 0.2s;
    }
    button:hover { filter: brightness(1.1); }
    button:active { transform: scale(0.98); }
    button:disabled { filter: grayscale(1); cursor: not-allowed; }
    #status { margin-top: 16px; min-height: 22px; font-size: 0.9em; }
    #status.ok { color: #7dd87d; }
    #status.err { color: #ff6b6b; }
  </style>
</head>
<body>
  <h1>NARAKA <span>HIGHLIGHT AI</span></h1>
  <div class="card">
    <label for="path">Path to your gameplay recording (.mp4)</label>
    <input type="text" id="path"
           placeholder="C:\\Users\\you\\Videos\\match.mp4" spellcheck="false" />
    <div class="hint">The file stays where it is - no copying. Paste the full path.</div>
    <button id="create">Create Task</button>
    <div id="status"></div>
  </div>

  <script>
    const pathInput = document.getElementById("path");
    const createBtn = document.getElementById("create");
    const statusEl = document.getElementById("status");

    function setStatus(msg, cls) {
      statusEl.textContent = msg;
      statusEl.className = cls || "";
    }

    createBtn.addEventListener("click", async () => {
      const raw = pathInput.value.trim().replace(/^"|"$/g, "");
      if (!raw.toLowerCase().endsWith(".mp4")) {
        setStatus("Please enter a full path to an .mp4 file.", "err");
        return;
      }
      // Backend expects forward slashes in file_path.
      const filePath = raw.replace(/\\/g, "/");
      const fileName = filePath.split("/").pop();

      createBtn.disabled = true;
      setStatus("Creating task...");
      try {
        const res = await fetch("/api/tasks/", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            file_path: filePath,
            file_name: fileName,
            game_type: "naraka",
          }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${res.status}`);
        }
        const task = await res.json();
        setStatus(`Task #${task.id} created - ${fileName}`, "ok");
      } catch (e) {
        setStatus(`Failed: ${e.message}`, "err");
      } finally {
        createBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
